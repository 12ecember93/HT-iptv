<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TV360 WEB BYPASS ENGINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <style>
        :root { --yellow: #ffcc00; --focus-bg: rgba(255,255,255,0.25); --sidebar-w: 163px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #app { position: absolute; top: 50%; left: 50%; background: #000; overflow: hidden; }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; display: block; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--yellow); font-weight: bold; font-size: 16px; z-index: 60; text-shadow: 0 0 12px #000; display: none; }
        #unmute-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 204, 0, 0.9); color: #000; padding: 10px 20px; font-weight: bold; border-radius: 20px; font-size: 13px; z-index: 55; pointer-events: none; display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .controls-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 50; }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }
        .sidebar { position: absolute; top: 0; left: 0; width: var(--sidebar-w); height: 100%; background: rgba(10,10,10,0.97); border-right: 1px solid #333; overflow-y: auto; overflow-x: hidden; transform: translateX(-100%); transition: transform 0.2s; }
        .controls-overlay.active .sidebar { transform: translateX(0); }
        .side-item { padding: 14px 10px; border-bottom: 1px solid #1a1a1a; text-align: center; opacity: 0.5; cursor: pointer; }
        .side-item.active { opacity: 1; border-left: 4px solid var(--yellow); background: rgba(255,204,0,0.12); }
        .side-item img { max-width: 90%; max-height: 50px; object-fit: contain; display: block; margin: auto; }
    </style>
</head>
<body>
<div id="app">
    <video id="main-video" autoplay playsinline webkit-playsinline muted></video>
    <div id="loading">ĐANG KẾT NỐI LUỒNG...</div>
    <div id="unmute-hint">CHẠM MÀN HÌNH ĐỂ BẬT TIẾNG 🔊</div>
    <div class="controls-overlay" id="ui-overlay">
        <div class="sidebar" id="sidebar-el"></div>
    </div>
</div>

<script>
const v          = document.getElementById('main-video');
const overlay    = document.getElementById('ui-overlay');
const sidebar    = document.getElementById('sidebar-el');
const loader     = document.getElementById('loading');
const app        = document.getElementById('app');
const unmuteHint = document.getElementById('unmute-hint');

let hls = null;
let channels = [], curIdx = 0, uiTimer = null;

// LINK FILE M3U TRÊN GITHUB CỦA BỒ
const M3U_URL = "https://raw.githubusercontent.com/12ecember93/HT-iptv/main/playlist.m3u";

// CỔNG TRUNG GIAN GIẢI CỨU CORS VÀ RE-HEADER CHO TRÌNH DUYỆT
const PROXY_URL = "https://cors-anywhere.herokuapp.com/"; 

function autoResponsiveLandscape() {
    const w = window.innerWidth; const h = window.innerHeight;
    if (w < h) { app.style.width = h + 'px'; app.style.height = w + 'px'; app.style.transform = 'translate(-50%, -50%) rotate(90deg)'; }
    else { app.style.width = '100%'; app.style.height = '100%'; app.style.transform = 'translate(-50%, -50%) rotate(0deg)'; }
}
autoResponsiveLandscape();
window.addEventListener('resize', autoResponsiveLandscape);

function parseM3U(text) {
    const lines = text.split('\n');
    const list = [];
    let currentItem = null;

    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) continue;

        if (line.startsWith('#EXTINF:')) {
            currentItem = {};
            const logoMatch = line.match(/tvg-logo="([^"]+)"/);
            currentItem.logo = logoMatch ? logoMatch[1] : '';
            const nameParts = line.split(',');
            currentItem.name = nameParts.length > 1 ? nameParts[nameParts.length - 1].trim() : 'TV360';
        } else if (line.startsWith('http')) {
            if (currentItem) {
                currentItem.url = line;
                list.push(currentItem);
                currentItem = null;
            }
        }
    }
    return list;
}

function directPlay(url) {
    loader.style.display = 'block';
    
    // Đập tan lỗi CORS và lỗi User-Agent bằng cách mượn cổng Proxy xử lý luồng mạng
    // Note: Nếu proxy công cộng bị nghẽn, bồ có thể đổi sang proxy cá nhân của bồ
    let finalUrl = url.includes('duckdns.org') ? PROXY_URL + url : url;

    if (hls) { hls.destroy(); }

    if (Hls.isSupported()) {
        hls = new Hls({
            xhrSetup: function (xhr, url) {
                // Ép Header trực tiếp thông qua cơ chế XHR của Hls.js trước khi đổ vào thẻ Video
                if(url.includes('duckdns.org') || url.includes('tv360')){
                    xhr.setRequestHeader('X-Requested-With', 'com.viettel.tv360');
                }
            }
        });
        hls.loadSource(finalUrl);
        hls.attachMedia(v);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { v.play().catch(()=>{}); });
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) { console.error("Lỗi luồng HLS:", data); loader.innerText = "LỖI KẾT NỐI LUỒNG"; }
        });
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
        // Hỗ trợ trực tiếp cho trình duyệt Safari trên iPhone
        v.src = finalUrl;
        v.addEventListener('loadedmetadata', () => { v.play().catch(()=>{}); });
    }
}

v.addEventListener('playing', () => { loader.style.display = 'none'; if (v.muted) unmuteHint.style.display = 'block'; });
v.addEventListener('waiting', () => loader.style.display = 'block');

function playChannel(idx) {
    if (idx < 0 || idx >= channels.length) return;
    curIdx = idx; loader.innerText = "ĐANG KẾT NỐI...";
    document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
    if (sidebar.children[idx]) sidebar.children[idx].classList.add('active');
    directPlay(channels[idx].url);
}

function showUI() { overlay.classList.add('active'); resetHideTimer(); }
function hideUI() { overlay.classList.remove('active'); clearTimeout(uiTimer); }
function resetHideTimer() { clearTimeout(uiTimer); uiTimer = setTimeout(hideUI, 2500); }

app.addEventListener('click', (e) => {
    if (v.muted) { v.muted = false; unmuteHint.style.display = 'none'; }
    if (sidebar.contains(e.target)) return;
    overlay.classList.contains('active') ? hideUI() : showUI();
});

async function init() {
    fetch(M3U_URL)
        .then(res => res.text())
        .then(text => {
            channels = parseM3U(text);
            sidebar.innerHTML = "";
            channels.forEach((c, i) => {
                const el = document.createElement('div');
                el.className = 'side-item';
                el.innerHTML = `<img src="${c.logo}" loading="lazy" title="${c.name}">`;
                el.addEventListener('click', (e) => { e.stopPropagation(); playChannel(i); hideUI(); });
                sidebar.appendChild(el);
            });

            if (channels.length > 0) {
                if (sidebar.children[0]) sidebar.children[0].classList.add('active');
                directPlay(channels[0].url);
            }
        })
        .catch(() => { loader.innerText = "LỖI TẢI FILE M3U GITHUB"; });
}

init();
</script>
</body>
</html>
