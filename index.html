<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TV</title>
    <link rel="icon" type="image/jpeg" href="https://github.com/12ecember93/HT-iptv/blob/main/httv.png">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --yellow: #ffcc00; --focus-bg: rgba(255,255,255,0.25); }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }

        #video-viewport { position: fixed; inset: 0; width: 100vw; height: 100vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }

        .controls-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.2);
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s; z-index: 50;
        }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }

        .sidebar {
            position: absolute; top: 0; left: 0;
            width: 130px; height: 100%;
            background: rgba(10,10,10,0.96);
            border-right: 1px solid #333;
            overflow-y: auto; overflow-x: hidden;
            transform: translateX(-100%);
            transition: transform 0.2s;
            scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar { display: none; }
        .controls-overlay.active .sidebar { transform: translateX(0); }

        .side-item {
            padding: 12px 8px; border-bottom: 1px solid #1a1a1a;
            text-align: center; opacity: 0.5;
            cursor: pointer; transition: 0.15s;
            outline: none;
        }
        .side-item.active { opacity: 1; border-left: 4px solid var(--yellow); background: rgba(255,204,0,0.12); }
        .side-item.focused { opacity: 1; background: var(--focus-bg); transform: scale(1.04); }
        .side-item img { max-width: 90%; max-height: 42px; object-fit: contain; pointer-events: none; display: block; margin: auto; }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: var(--yellow); font-weight: bold;
            font-size: 16px; z-index: 60;
            text-shadow: 0 0 12px #000;
            pointer-events: none; display: none;
        }
    </style>
</head>
<body>

<div id="video-viewport">
    <video id="main-video" autoplay playsinline webkit-playsinline></video>
    <div id="loading">ĐANG TẢI...</div>
    <div class="controls-overlay" id="ui-overlay">
        <div class="sidebar" id="sidebar-el"></div>
    </div>
</div>

<script>
const v       = document.getElementById('main-video');
const overlay = document.getElementById('ui-overlay');
const sidebar = document.getElementById('sidebar-el');
const loader  = document.getElementById('loading');

let hls = new Hls({ manifestLoadingMaxRetry: 10, levelLoadingMaxRetry: 10, fragLoadingMaxRetry: 10 });
let channels = [], curIdx = 0, uiTimer = null;

// ── HLS error recovery ──────────────────────────────────────
hls.on(Hls.Events.ERROR, (_, d) => {
    if (!d.fatal) return;
    if (d.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
    else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
});

// ── Play ────────────────────────────────────────────────────
function playChannel(idx) {
    if (idx < 0 || idx >= channels.length) return;
    curIdx = idx;
    const c = channels[idx];
    loader.style.display = 'block';

    document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
    const activeEl = sidebar.children[idx];
    if (activeEl) {
        activeEl.classList.add('active');
        activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    if (Hls.isSupported()) {
        hls.detachMedia();
        hls.loadSource(c.url);
        hls.attachMedia(v);
        hls.once(Hls.Events.MANIFEST_PARSED, () => v.play().catch(() => {}));
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
        v.src = c.url; v.play().catch(() => {});
    }
}

v.addEventListener('playing', () => loader.style.display = 'none');

// ── UI show/hide ────────────────────────────────────────────
function showUI() {
    overlay.classList.add('active');
    setFocus(curIdx);
    resetHideTimer();
}

function hideUI() {
    overlay.classList.remove('active');
    clearFocus();
    clearTimeout(uiTimer);
}

function resetHideTimer() {
    clearTimeout(uiTimer);
    uiTimer = setTimeout(hideUI, 2000);
}

// ── Focus helper ────────────────────────────────────────────
function setFocus(idx) {
    document.querySelectorAll('.side-item').forEach(el => el.classList.remove('focused'));
    const el = sidebar.children[idx];
    if (el) {
        el.classList.add('focused');
        el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
}

function clearFocus() {
    document.querySelectorAll('.side-item').forEach(el => el.classList.remove('focused'));
}

// ── Touch / Mouse ───────────────────────────────────────────
document.getElementById('video-viewport').addEventListener('click', (e) => {
    if (overlay.contains(e.target) && e.target !== overlay) return; // click vào sidebar item → do nothing here
    overlay.classList.contains('active') ? hideUI() : showUI();
});

// ── Fullscreen ──────────────────────────────────────────────
function tryFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    if (screen.orientation?.lock) screen.orientation.lock('landscape').catch(() => {});
}

// ── Keyboard / D-pad ───────────────────────────────────────
document.addEventListener('keydown', (e) => {
    const KEYS = { UP: 38, DOWN: 40, LEFT: 37, RIGHT: 39, OK: 13, OK2: 23, BACK: 8, MENU: 18 };

    // BACK / MENU
    if (e.keyCode === KEYS.BACK || e.keyCode === KEYS.MENU) {
        e.preventDefault();
        overlay.classList.contains('active') ? hideUI() : showUI();
        return;
    }

    // Nếu UI chưa hiện → mọi phím đều mở
    if (!overlay.classList.contains('active')) {
        e.preventDefault(); showUI(); return;
    }

    resetHideTimer();

    const n = channels.length;
    if (e.keyCode === KEYS.DOWN) {
        e.preventDefault();
        curIdx = (curIdx + 1) % n;        // wrap cuối → đầu
        setFocus(curIdx);
    } else if (e.keyCode === KEYS.UP) {
        e.preventDefault();
        curIdx = (curIdx - 1 + n) % n;    // wrap đầu → cuối
        setFocus(curIdx);
    } else if (e.keyCode === KEYS.OK || e.keyCode === KEYS.OK2 || e.keyCode === KEYS.RIGHT) {
        e.preventDefault();
        playChannel(curIdx);
        hideUI();
    } else if (e.keyCode === KEYS.LEFT) {
        e.preventDefault();
        hideUI();
    }
});

// ── Init ────────────────────────────────────────────────────
async function init() {
    try {
        const res = await fetch('playlist.json');
        const data = await res.json();
        let raw = Object.values(data).flat();

        // THVL1 lên đầu sidebar
        const thvl1 = raw.find(c => c.short === 'THVL1');
        const rest  = raw.filter(c => c.short !== 'THVL1');
        channels = thvl1 ? [thvl1, ...rest] : raw;

        channels.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = 'side-item';
            el.setAttribute('data-url', c.url);
            el.innerHTML = `<img src="${c.logo}" loading="lazy" title="${c.name}">`;
            el.addEventListener('click', (e) => { e.stopPropagation(); playChannel(i); hideUI(); });
            sidebar.appendChild(el);
        });

        // Phát VTV1 mặc định
        const vtv1Idx = channels.findIndex(c => c.short === 'VTV1');
        playChannel(vtv1Idx >= 0 ? vtv1Idx : 0);

        // Auto fullscreen
        tryFullscreen();
        document.addEventListener('click', tryFullscreen, { once: true });

    } catch (err) {
        loader.style.display = 'block';
        loader.innerText = 'LỖI DANH SÁCH';
    }
}

init();
</script>
</body>
</html>
