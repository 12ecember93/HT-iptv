<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --bg-dark: #0f0f0f; --text-main: #fff; --primary-color: #f00; 
            --fav-color: #ffcc00; --active-bg: rgba(255, 255, 255, 0.15);
            --action-blue: #0056b3; --exit-bg: #cc0000;
        }
        body { font-family: "Roboto", Arial, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Player */
        #player-box { position: sticky; top: 0; z-index: 1000; background: #000; width: 100%; max-width: 1200px; margin: 0 auto; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; display: block; pointer-events: none; }

        /* Overlay */
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
            background: rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s; z-index: 1001; pointer-events: none;
        }
        .video-overlay.show { opacity: 1; pointer-events: auto; }

        /* Chuyển kênh nhanh - Chỉ tên kênh */
        .overlay-bottom { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 70px; scrollbar-width: none; }
        .overlay-bottom::-webkit-scrollbar { display: none; }
        .quick-btn { background: #fff; color: #000; border: none; padding: 12px 20px; border-radius: 8px; white-space: nowrap; font-size: 15px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .exit-fs-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--exit-bg); color: white; border: none;
            padding: 12px 25px; border-radius: 5px; font-weight: 900;
            font-size: 16px; box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .big-action-bar { 
            max-width: 1200px; margin: 0 auto; padding: 15px; 
            background: var(--action-blue); color: white; text-align: center;
            font-weight: bold; cursor: pointer; font-size: 18px;
        }

        .video-info { max-width: 1200px; margin: 0 auto; padding: 10px 15px; }
        .current-title { font-size: 16px; font-weight: 800; margin: 0; color: var(--fav-color); }

        /* Grid System */
        .container { max-width: 1200px; margin: 0 auto; padding: 5px; }
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 5px; }
        @media (min-width: 992px) { .channel-grid { grid-template-columns: repeat(6, 1fr); gap: 12px; } }

        .group-header { grid-column: 1 / -1; padding: 15px 10px 5px 10px; font-size: 12px; font-weight: bold; color: #4db8ff; text-transform: uppercase; }

        .channel-item { background: #1a1a1a; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; border: 1px solid #333; }
        .channel-item.active { border-color: var(--primary-color); background: var(--active-bg); }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #252525; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 5px; }
        .thumb-box img { width: 85%; height: 85%; object-fit: contain; }
        .channel-name { font-size: 11px; font-weight: 700; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .star-btn { position: absolute; top: 1px; right: 1px; font-size: 22px; color: rgba(255,255,255,0.15); padding: 5px; }
        .star-btn.is-fav { color: var(--fav-color); }
    </style>
</head>
<body>

<div id="player-box" onclick="showOverlay()">
    <video id="video" autoplay playsinline></video>
    <div class="video-overlay" id="overlay">
        <div class="overlay-bottom" id="quick-nav"></div>
        <button class="exit-fs-btn" onclick="exitFS(event)">✕ TRỞ LẠI</button>
    </div>
</div>

<div class="big-action-bar" onclick="toggleFS()">🔳 XEM TOÀN MÀN HÌNH</div>

<div class="video-info"><p class="current-title" id="current-title">Đang tải...</p></div>

<div class="container">
    <div class="channel-grid" id="main-list"></div>
</div>

<script>
    const rawChannels = [
        { id: "v1", short: "VTV1", name: "VTV1 HD", logo: "https://vn.xemtv.net/image/vtv1.png", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8", group: "VTV" },
        { id: "v2", short: "VTV2", name: "VTV2 HD", logo: "https://vn.xemtv.net/image/vtv2.png", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8", group: "VTV" },
        { id: "v3", short: "VTV3", name: "VTV3 HD", logo: "https://vn.xemtv.net/image/vtv3.png", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8", group: "VTV" },
        { id: "v4", short: "VTV4", name: "VTV4 HD", logo: "https://vn.xemtv.net/image/vtv4.png", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8", group: "VTV" },
        { id: "v5", short: "VTV5", name: "VTV5 HD", logo: "https://vn.xemtv.net/image/vtv5.png", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8", group: "VTV" },
        { id: "vct", short: "VTV CT", name: "VTV Cần Thơ", logo: "https://vn.xemtv.net/image/vtvcantho.png", url: "https://live.fptplay53.net/fnxch2/vtvcantho_abr.smil/chunklist_b4200000.m3u8", group: "VTV" },
        { id: "v7", short: "VTV7", name: "VTV7 HD", logo: "https://vn.xemtv.net/image/vtv7.png", url: "https://live.fptplay53.net/fnxhd1/vtv7hd_vhls.smil/chunklist_b5000000.m3u8", group: "VTV" },
        { id: "v8", short: "VTV8", name: "VTV8 HD", logo: "https://vn.xemtv.net/image/vtv8.png", url: "https://live.fptplay53.net/epzhd1/vtv8hd_vhls.smil/chunklist.m3u8", group: "VTV" },
        { id: "v9", short: "VTV9", name: "VTV9 HD", logo: "https://vn.xemtv.net/image/vtv9.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv9-hd/KenhCoBan.m3u8", group: "VTV" },
        { id: "h1", short: "HTV1", name: "HTV1 HD", logo: "https://vn.xemtv.net/image/htv1.png", url: "https://live.fptplay53.net/epzhd1/htv1_hls.smil/chunklist.m3u8", group: "HTV" },
        { id: "h2", short: "HTV2", name: "HTV2 HD", logo: "https://vn.xemtv.net/image/htv2.png", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist.m3u8", group: "HTV" },
        { id: "h7", short: "HTV7", name: "HTV7 HD", logo: "https://vn.xemtv.net/image/htv7.png", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8", group: "HTV" },
        { id: "h9", short: "HTV9", name: "HTV9 HD", logo: "https://vn.xemtv.net/image/htv9.png", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8", group: "HTV" },
        { id: "vl1", short: "THVL1", name: "TH Vĩnh Long 1", logo: "https://vn.xemtv.net/image/vinhlong1.png", url: "https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8", group: "KHÁC" },
        { id: "vnt", short: "VNT", name: "Vietnam Today", logo: "https://vn.xemtv.net/image/vietnamtoday.png", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist_b5000000.m3u8", group: "KHÁC" },
        { id: "d_v1", short: "V1 DP", name: "VTV1 Dự phòng", logo: "https://vn.xemtv.net/image/vtv1.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv1-hd/KenhCoBan.m3u8", group: "DỰ PHÒNG" },
        { id: "d_v3", short: "V3 DP", name: "VTV3 Dự phòng", logo: "https://vn.xemtv.net/image/vtv3.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv3-hd/KenhCoBan.m3u8", group: "DỰ PHÒNG" },
        { id: "d_v5", short: "V5 DP", name: "VTV5 Dự phòng", logo: "https://vn.xemtv.net/image/vtv5.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv5-hd/KenhCoBan.m3u8", group: "DỰ PHÒNG" },
        { id: "d_vl1", short: "VL1 DP", name: "THVL1 Dự phòng", logo: "https://vn.xemtv.net/image/vinhlong1.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/thvl1-hd/KenhCoBan.m3u8", group: "DỰ PHÒNG" }
    ];

    let favorites = JSON.parse(localStorage.getItem('iptv_favs')) || ["v1", "v3", "vl1"];
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    let hls = new Hls();
    let hideTimeout;

    function showOverlay() {
        overlay.classList.add('show');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => overlay.classList.remove('show'), 5000);
    }

    function exitFS(e) {
        e.stopPropagation();
        if (document.fullscreenElement) document.exitFullscreen();
        overlay.classList.remove('show');
    }

    function toggleFS() {
        const p = document.getElementById('player-box');
        if (p.requestFullscreen) p.requestFullscreen();
        else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    }

    function renderList() {
        const mainList = document.getElementById('main-list');
        mainList.innerHTML = "";
        if (favorites.length > 0) renderGroup("⭐ YÊU THÍCH", rawChannels.filter(c => favorites.includes(c.id)), true);
        ["VTV", "HTV", "KHÁC", "DỰ PHÒNG"].forEach(g => renderGroup(g, rawChannels.filter(c => c.group === g), false));
    }

    function renderGroup(title, list, isFav) {
        const mainList = document.getElementById('main-list');
        if(list.length === 0) return;
        const header = document.createElement('div');
        header.className = `group-header ${isFav ? 'fav-header' : ''}`;
        header.innerText = title;
        mainList.appendChild(header);

        list.forEach(channel => {
            const item = document.createElement('div');
            item.className = 'channel-item' + (video.src === channel.url ? ' active' : '');
            item.innerHTML = `
                <div class="thumb-box"><img src="${channel.logo}"></div>
                <div class="channel-name">${channel.name}</div>
                <div class="star-btn ${favorites.includes(channel.id) ? 'is-fav' : ''}" onclick="toggleFav(event, '${channel.id}')">★</div>
            `;
            item.onclick = () => playStream(channel, item);
            mainList.appendChild(item);
        });
    }

    function playStream(channel, element) {
        document.getElementById('current-title').innerText = channel.name;
        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
        if(element) element.classList.add('active');
        
        // Cập nhật nguồn video mà không làm ảnh hưởng đến Fullscreen
        if (Hls.isSupported()) {
            hls.destroy(); hls = new Hls();
            hls.loadSource(channel.url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { 
            video.src = channel.url; video.play(); 
        }
        
        updateQuickNav(channel);
        overlay.classList.remove('show');
    }

    function updateQuickNav(curr) {
        const nav = document.getElementById('quick-nav');
        nav.innerHTML = "";
        const idx = rawChannels.findIndex(c => c.id === curr.id);
        rawChannels.slice(idx + 1, idx + 5).forEach(next => {
            const btn = document.createElement('button');
            btn.className = 'quick-btn';
            btn.innerText = ">> " + next.short;
            btn.onclick = (e) => { 
                e.stopPropagation(); 
                playStream(next); 
            };
            nav.appendChild(btn);
        });
    }

    function toggleFav(e, id) {
        e.stopPropagation();
        if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
        else favorites.push(id);
        localStorage.setItem('iptv_favs', JSON.stringify(favorites));
        renderList();
    }

    window.onload = () => { renderList(); playStream(rawChannels[0]); };
</script>
</body>
</html>
