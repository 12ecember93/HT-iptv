<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --bg-dark: #0f0f0f; --text-main: #fff; --primary-color: #f00; 
            --fav-color: #ffcc00; --active-bg: rgba(255, 255, 255, 0.15);
            --action-blue: #0056b3; --exit-bg: #cc0000;
        }
        body { font-family: "Roboto", Arial, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* Player */
        #player-box { position: sticky; top: 0; z-index: 1000; background: #000; width: 100%; max-width: 1200px; margin: 0 auto; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; display: block; pointer-events: none; }

        /* Overlay */
        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
            background: rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s; z-index: 1001; pointer-events: none;
        }
        .video-overlay.show { opacity: 1; pointer-events: auto; }

        /* Chuyển kênh nhanh - Chỉ tên kênh */
        .overlay-bottom { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 70px; scrollbar-width: none; }
        .overlay-bottom::-webkit-scrollbar { display: none; }
        .quick-btn { background: #fff; color: #000; border: none; padding: 12px 20px; border-radius: 8px; white-space: nowrap; font-size: 15px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .exit-fs-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--exit-bg); color: white; border: none;
            padding: 12px 25px; border-radius: 5px; font-weight: 900;
            font-size: 16px; box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .big-action-bar { 
            max-width: 1200px; margin: 0 auto; padding: 15px; 
            background: var(--action-blue); color: white; text-align: center;
            font-weight: bold; cursor: pointer; font-size: 18px;
        }

        .video-info { max-width: 1200px; margin: 0 auto; padding: 10px 15px; }
        .current-title { font-size: 16px; font-weight: 800; margin: 0; color: var(--fav-color); }

        /* Grid System */
        .container { max-width: 1200px; margin: 0 auto; padding: 5px; }
        .channel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 5px; }
        @media (min-width: 992px) { .channel-grid { grid-template-columns: repeat(6, 1fr); gap: 12px; } }

        .group-header { grid-column: 1 / -1; padding: 15px 10px 5px 10px; font-size: 12px; font-weight: bold; color: #4db8ff; text-transform: uppercase; }

        .channel-item { background: #1a1a1a; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; border: 1px solid #333; }
        .channel-item.active { border-color: var(--primary-color); background: var(--active-bg); }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #252525; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 5px; }
        .thumb-box img { width: 85%; height: 85%; object-fit: contain; }
        .channel-name { font-size: 11px; font-weight: 700; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .star-btn { position: absolute; top: 1px; right: 1px; font-size: 22px; color: rgba(255,255,255,0.15); padding: 5px; }
        .star-btn.is-fav { color: var(--fav-color); }
    </style>
</head>
<body>

<div id="player-box" onclick="showOverlay()">
    <video id="video" autoplay playsinline></video>
    <div class="video-overlay" id="overlay">
        <div class="overlay-bottom" id="quick-nav"></div>
        <button class="exit-fs-btn" onclick="exitFS(event)">✕ TRỞ LẠI</button>
    </div>
</div>

<div class="big-action-bar" onclick="toggleFS()">🔳 XEM TOÀN MÀN HÌNH</div>

<div class="video-info"><p class="current-title" id="current-title">Đang tải...</p></div>

<div class="container">
    <div class="channel-grid" id="main-list"></div>
</div>
