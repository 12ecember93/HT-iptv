<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Clean</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:#0f0f0f; color:#fff; font-family:sans-serif; }

/* VIDEO */
.video-container {
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
}
video { width:100%; height:100%; }

/* OVERLAY */
.overlay {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:200px;
  background:rgba(0,0,0,0.9);
  overflow:auto;
}
.item {
  padding:10px;
  border-bottom:1px solid #222;
  text-align:center;
  cursor:pointer;
}
.item img { width:100px; height:50px; object-fit:contain; }
.item span { display:block; font-size:13px; }

/* BUTTON */
.controls {
  position:absolute;
  bottom:15px;
  right:15px;
  display:flex;
  gap:10px;
}
.btn {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
.full { background:#22c55e; color:#000; }
.exit { background:#ef4444; color:#fff; }

/* LIST MOBILE */
.container { padding:10px; }
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.card {
  background:#1e293b;
  border-radius:8px;
  padding:8px;
  text-align:center;
  cursor:pointer;
}
.card img { width:100%; height:60px; object-fit:contain; }
</style>
</head>

<body>

<div class="video-container">
  <video id="video" playsinline muted></video>

  <div class="overlay">
    <div class="sidebar" id="sidebar"></div>
  </div>

  <div class="controls">
    <button class="btn full" onclick="goFull()">FULL</button>
    <button class="btn exit" onclick="exitFull()">EXIT</button>
  </div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
const channels = [
  // 3 kênh ưu tiên
  {name:"THVL1",logo:"https://static3.thvli.vn/assets/thumbnail/2025/09/12/pbe9c6gh_button_thvl1.png",url:"https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8"},
  {name:"VTV1",logo:"https://vn.xemtv.net/image/vtv1.png",url:"https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8"},
  {name:"VTV3",logo:"https://vn.xemtv.net/image/vtv3.png",url:"https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8"},

  // còn lại
  {name:"VTV2",logo:"https://vn.xemtv.net/image/vtv2.png",url:"https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8"},
  {name:"VTV4",logo:"https://vn.xemtv.net/image/vtv4.png",url:"https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8"},
  {name:"VTV5",logo:"https://vn.xemtv.net/image/vtv5.png",url:"https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8"},
  {name:"HTV7",logo:"https://vn.xemtv.net/image/htv7.png",url:"https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8"},
  {name:"HTV9",logo:"https://vn.xemtv.net/image/htv9.png",url:"https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8"}
];

const video = document.getElementById("video");
let hls;

/* PLAY */
function play(url){
  if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = url;
    video.play();
  }else{
    if(hls) hls.destroy();
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>video.play());
  }
}

/* FULLSCREEN */
function goFull(){
  if(video.webkitEnterFullscreen){
    video.webkitEnterFullscreen(); // iOS
  }else{
    document.querySelector('.video-container').requestFullscreen();
  }
}
function exitFull(){
  if(document.exitFullscreen){
    document.exitFullscreen();
  }
}

/* RENDER */
function render(){
  const sidebar = document.getElementById("sidebar");
  const grid = document.getElementById("grid");

  channels.forEach(c=>{
    // sidebar
    let s = document.createElement("div");
    s.className="item";
    s.innerHTML = `<img src="${c.logo}"><span>${c.name}</span>`;
    s.onclick = ()=>play(c.url);
    sidebar.appendChild(s);

    // grid
    let g = document.createElement("div");
    g.className="card";
    g.innerHTML = `<img src="${c.logo}"><div>${c.name}</div>`;
    g.onclick = ()=>play(c.url);
    grid.appendChild(g);
  });
}

/* INIT */
render();
play(channels[0].url);
</script>

</body>
</html>
