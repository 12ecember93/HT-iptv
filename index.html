<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:system-ui;
}

/* VIDEO */
.video-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
}
video{
  width:100%;
  height:100%;
}

/* TOP BAR */
.topbar{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  padding:10px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  font-weight:600;
}

/* BUTTON */
.fs-btn{
  position:absolute;
  bottom:15px;
  right:15px;
  background:#22c55e;
  color:#000;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  font-weight:700;
}

/* LIST */
.list{
  padding:10px;
}

.group{
  margin:10px 0 5px;
  color:#aaa;
  font-size:13px;
}

.row{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.item{
  min-width:120px;
  background:#111;
  border-radius:10px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}
.item img{
  width:100%;
  height:50px;
  object-fit:contain;
}
.item span{
  font-size:12px;
}
</style>
</head>

<body>

<div class="video-wrap">
  <video id="video" playsinline muted></video>
  <div class="topbar" id="title">Đang tải...</div>
  <button class="fs-btn" onclick="goFull()">FULL</button>
</div>

<div class="list" id="list"></div>

<script>
const groups = [
{
 name:"Ưu tiên",
 channels:[
  {n:"THVL1",l:"https://static3.thvli.vn/assets/thumbnail/2025/09/12/pbe9c6gh_button_thvl1.png",u:"https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8"},
  {n:"VTV1",l:"https://vn.xemtv.net/image/vtv1.png",u:"https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8"},
  {n:"VTV3",l:"https://vn.xemtv.net/image/vtv3.png",u:"https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8"}
 ]
},
{
 name:"Khác",
 channels:[
  {n:"VTV2",l:"https://vn.xemtv.net/image/vtv2.png",u:"https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8"},
  {n:"VTV4",l:"https://vn.xemtv.net/image/vtv4.png",u:"https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8"},
  {n:"VTV5",l:"https://vn.xemtv.net/image/vtv5.png",u:"https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8"},
  {n:"HTV7",l:"https://vn.xemtv.net/image/htv7.png",u:"https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8"},
  {n:"HTV9",l:"https://vn.xemtv.net/image/htv9.png",u:"https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8"}
 ]
}
];

const video=document.getElementById("video");
const title=document.getElementById("title");
let hls;

/* PLAY */
function play(c){
 title.innerText=c.n;

 if(video.canPlayType('application/vnd.apple.mpegurl')){
   video.src=c.u;
   video.play();
 }else{
   if(hls) hls.destroy();
   hls=new Hls();
   hls.loadSource(c.u);
   hls.attachMedia(video);
   hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
 }
}

/* FULL */
function goFull(){
 if(video.webkitEnterFullscreen){
   video.webkitEnterFullscreen();
 }else{
   document.querySelector('.video-wrap').requestFullscreen();
 }
}

/* RENDER */
const list=document.getElementById("list");

groups.forEach(g=>{
 let t=document.createElement("div");
 t.className="group";
 t.innerText=g.name;
 list.appendChild(t);

 let row=document.createElement("div");
 row.className="row";

 g.channels.forEach(c=>{
   let i=document.createElement("div");
   i.className="item";
   i.innerHTML=`<img src="${c.l}"><span>${c.n}</span>`;
   i.onclick=()=>play(c);
   row.appendChild(i);
 });

 list.appendChild(row);
});

/* INIT */
play(groups[0].channels[0]);
</script>

</body>
</html>
