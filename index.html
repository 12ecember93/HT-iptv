<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Final Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-dark: #0f0f0f; --action-blue: #0056b3; --stat-color: #00ff00; }
        body { font-family: sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        #video-viewport { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; z-index: 1; }
        video { width: 100%; height: 100%; display: block; }

        .stats-overlay {
            color: var(--stat-color); font-family: monospace;
            background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px;
            pointer-events: none; z-index: 2147483647;
        }
        
        /* Stats Sidebar: Căn sang phải */
        #sb-stats { 
            font-size: 10px; 
            margin: 10px 10px 5px auto; /* Đẩy sang phải bằng margin auto */
            text-align: right; 
            width: fit-content; /* Chỉ rộng bằng nội dung chữ */
            display: block;
        }
        
        #fs-stats { position: absolute; top: 10px; right: 10px; font-size: 10px; display: none; }
        body.is-fs .controls-overlay.active #fs-stats { display: block; }

        .controls-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.2s;
            z-index: 2147483640; display: flex; pointer-events: none;
        }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }

        /* Sidebar căn giữa logo */
        .sidebar {
            width: 140px; height: 100%; background: rgba(10,10,10,0.98);
            transform: translateX(-100%); transition: transform 0.2s ease;
            border-right: 1px solid #333; overflow-y: auto; overscroll-behavior: contain;
            display: flex; flex-direction: column; /* Để điều khiển stats và list */
        }
        .controls-overlay.active .sidebar { transform: translateX(0); }
        
        .side-item { 
            padding: 10px; 
            border-bottom: 1px solid #222; 
            display: flex; /* Dùng flex để căn giữa logo */
            align-items: center; 
            justify-content: center; 
            min-height: 60px;
            cursor: pointer; 
        }
        .side-item img { max-width: 100%; max-height: 45px; object-fit: contain; pointer-events: none; }

        .btn-group { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 2147483647; }
        .action-btn {
            background: var(--action-blue); color: white; border: 1.5px solid #fff;
            padding: 12px 18px; border-radius: 50px; font-weight: bold; font-size: 13px; cursor: pointer;
        }
        body.is-fs .reload-btn, body.is-fs #btn-enter { display: none; }
        #btn-exit { display: none; position: absolute; bottom: 20px; right: 20px; }
        body.is-fs #btn-exit { display: block; }

        .info { padding: 10px 15px; border-bottom: 1px solid #333; }
        .info h2 { margin: 0; font-size: 16px; color: #ffcc00; }
        #web-stats { font-size: 11px; margin-top: 5px; display: inline-block; }

        /* Grid ngoài căn giữa logo */
        .mobile-container { padding: 10px; padding-bottom: 80px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-item { 
            background: #1a1a1a; 
            padding: 15px 5px; 
            border-radius: 8px; 
            border: 1px solid #333;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            aspect-ratio: 4/3; /* Giúp các ô vuông vức bằng nhau */
        }
        .grid-item img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        @media (min-width: 992px) { 
            #video-viewport { max-width: 80vw; margin: 15px auto; border-radius: 8px; }
        }
    </style>
</head>
<body>

<div id="video-viewport" onclick="showUI()">
    <video id="main-video" autoplay playsinline></video>
    <div id="fs-stats" class="stats-overlay">0 Mbps | 0 fps</div>
    
    <div class="controls-overlay" id="ui-overlay">
        <div class="sidebar" id="side-list" onclick="event.stopPropagation()">
            <div id="sb-stats" class="stats-overlay">0 Mbps | 0 fps</div>
            </div>
        <button id="btn-exit" class="action-btn" onclick="handleFS(false, event)">THOÁT</button>
    </div>
</div>

<div class="btn-group">
    <button class="action-btn" style="background:#333" onclick="location.reload()">↻</button>
    <button id="btn-enter" class="action-btn" onclick="handleFS(true, event)">TOÀN MÀN HÌNH</button>
</div>

<div class="info">
    <h2 id="now-playing">VTV1 HD</h2>
    <div id="web-stats" class="stats-overlay">0x0 | 0 Mbps | 0 fps</div>
</div>

<div class="mobile-container"><div class="grid" id="main-grid"></div></div>

<script>
    const channels = [
        { name: "Vĩnh Long 1", short: "THVL1", logo: "https://vn.xemtv.net/image/thvl1.png", url: "https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8" },
        { name: "VTV1 HD", short: "VTV1", logo: "https://vn.xemtv.net/image/vtv1.png", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8" },
        { name: "VTV2 HD", short: "VTV2", logo: "https://vn.xemtv.net/image/vtv2.png", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8" },
        { name: "VTV3 HD", short: "VTV3", logo: "https://vn.xemtv.net/image/vtv3.png", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8" },
        { name: "VTV4 HD", short: "VTV4", logo: "https://vn.xemtv.net/image/vtv4.png", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8" },
        { name: "VTV5 HD", short: "VTV5", logo: "https://vn.xemtv.net/image/vtv5.png", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8" },
        { name: "VTV7 HD", short: "VTV7", logo: "https://vn.xemtv.net/image/vtv7.png", url: "https://live.fptplay53.net/fnxhd1/vtv7hd_vhls.smil/chunklist_b5000000.m3u8" },
        { name: "VTV8 HD", short: "VTV8", logo: "https://vn.xemtv.net/image/vtv8.png", url: "https://live.fptplay53.net/epzhd1/vtv8hd_vhls.smil/chunklist.m3u8" },
        { name: "VTV9 HD", short: "VTV9", logo: "https://vn.xemtv.net/image/vtv9.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv9-hd/KenhCoBan.m3u8" },
        { name: "HTV7 HD", short: "HTV7", logo: "https://vn.xemtv.net/image/htv7.png", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8" },
        { name: "HTV9 HD", short: "HTV9", logo: "https://vn.xemtv.net/image/htv9.png", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8" },
        { name: "HTV1 HD", short: "HTV1", logo: "https://vn.xemtv.net/image/htv1.png", url: "https://live.fptplay53.net/epzhd1/htv1_hls.smil/chunklist.m3u8" },
        { name: "HTV2 HD", short: "HTV2", logo: "https://vn.xemtv.net/image/htv2.png", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist.m3u8" },
        { name: "HTV3 HD", short: "HTV3", logo: "https://vn.xemtv.net/image/htv3.png", url: "https://live.fptplay53.net/epzhd1/htv3_hls.smil/chunklist.m3u8" },
        { name: "Vietnam Today", short: "VNT", logo: "https://vn.xemtv.net/image/vietnamtoday.png", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist_b5000000.m3u8" }
    ];

    const v = document.getElementById('main-video'), view = document.getElementById('video-viewport');
    const overlay = document.getElementById('ui-overlay'), wStats = document.getElementById('web-stats'), fStats = document.getElementById('fs-stats'), sStats = document.getElementById('sb-stats');
    let hls = new Hls(), timer, lastTime = 0, frameCount = 0, fps = 0;

    function showUI() {
        overlay.classList.add('active');
        clearTimeout(timer);
        timer = setTimeout(() => overlay.classList.remove('active'), 2000);
    }

    function handleFS(enter, e) {
        if(e) e.stopPropagation();
        if(enter) {
            if(view.requestFullscreen) view.requestFullscreen();
            else if(view.webkitRequestFullscreen) view.webkitRequestFullscreen();
            if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        } else {
            if(document.exitFullscreen) document.exitFullscreen();
            else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => document.body.classList.toggle('is-fs', !!document.fullscreenElement));

    function updateFPS() {
        if (!v.paused) {
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) { fps = frameCount; frameCount = 0; lastTime = now; }
        }
        requestAnimationFrame(updateFPS);
    }
    updateFPS();

    setInterval(() => {
        if (v.readyState > 0) {
            const level = hls.levels[hls.currentLevel] || {};
            const mbps = level.bitrate ? (level.bitrate / 1000000).toFixed(1) + " Mbps" : "Auto";
            const res = v.videoWidth + "x" + v.videoHeight;
            const combined = `${mbps} | ${fps} fps`;
            wStats.innerText = `${res} | ${combined}`;
            fStats.innerText = combined;
            sStats.innerText = combined;
        }
    }, 1500);

    function play(c) {
        document.getElementById('now-playing').innerText = c.name;
        hls.destroy(); hls = new Hls();
        hls.loadSource(c.url); hls.attachMedia(v);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            v.play();
            if(document.fullscreenElement && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        });
        overlay.classList.remove('active');
    }

    function init() {
        const side = document.getElementById('side-list'), grid = document.getElementById('main-grid');
        channels.forEach(c => {
            const sItem = document.createElement('div'); sItem.className = 'side-item';
            sItem.innerHTML = `<img src="${c.logo}">`;
            sItem.onclick = () => play(c); side.appendChild(sItem);

            const gItem = document.createElement('div'); gItem.className = 'grid-item';
            gItem.innerHTML = `<img src="${c.logo}">`;
            gItem.onclick = () => play(c); grid.appendChild(gItem);
        });
        play(channels.find(c => c.short === "VTV1") || channels[0]);
    }
    init();
</script>
</body>
</html>
