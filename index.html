<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Tech Minimal</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-dark: #0f0f0f; --action-blue: #0056b3; --stat-color: #00ff00; }
        body { font-family: sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 0; overflow: hidden; }
        
        #video-viewport { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; display: block; }

        /* Stats nhỏ gọn ở góc phải khi Fullscreen */
        #fs-stats {
            position: absolute; top: 10px; right: 10px;
            font-size: 10px; color: var(--stat-color); font-family: monospace;
            background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 3px;
            z-index: 2147483647; display: none; pointer-events: none; opacity: 0.8;
        }
        body.is-fs #fs-stats { display: block; }

        .controls-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s;
            z-index: 100; display: flex; pointer-events: none;
        }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }

        .sidebar {
            width: 170px; height: 100%; background: rgba(10,10,10,0.98);
            transform: translateX(-100%); transition: transform 0.2s;
            border-right: 1px solid #333; overflow-y: auto;
        }
        .controls-overlay.active .sidebar { transform: translateX(0); }
        .side-item { padding: 12px 10px; border-bottom: 1px solid #222; text-align: center; cursor: pointer; }
        .side-item img { width: 90px; height: 45px; object-fit: contain; }

        .btn-group { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 200; }
        .action-btn {
            background: var(--action-blue); color: white; border: 1px solid #fff;
            padding: 12px 18px; border-radius: 50px; font-weight: bold; font-size: 13px; cursor: pointer;
        }
        body.is-fs .reload-btn, body.is-fs #btn-enter { display: none; }
        #btn-exit { display: none; position: absolute; bottom: 20px; right: 20px; }
        body.is-fs #btn-exit { display: block; }

        .info { padding: 10px 15px; border-bottom: 1px solid #333; }
        .info h2 { margin: 0; font-size: 16px; color: #ffcc00; }
        .stats-row { font-family: monospace; font-size: 11px; color: var(--stat-color); margin-top: 3px; }

        .mobile-container { padding: 10px; overflow-y: auto; height: calc(100vh - 300px); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-item { background: #1a1a1a; padding: 8px; border-radius: 5px; text-align: center; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="video-viewport" onclick="showUI()">
    <video id="main-video" autoplay playsinline></video>
    <div id="fs-stats">0x0 | 0Mbps | 0fps</div>
    <div class="controls-overlay" id="ui-overlay">
        <div class="sidebar" id="side-list" onclick="event.stopPropagation()"></div>
        <button id="btn-exit" class="action-btn" onclick="handleFS(false, event)">THOÁT</button>
    </div>
</div>

<div class="btn-group">
    <button class="action-btn" style="background:#333" onclick="location.reload()">↻</button>
    <button id="btn-enter" class="action-btn" onclick="handleFS(true, event)">TOÀN MÀN HÌNH</button>
</div>

<div class="info">
    <h2 id="now-playing">Đang tải...</h2>
    <div class="stats-row" id="web-stats">0x0 | 0Mbps | 0fps</div>
</div>

<div class="mobile-container"><div class="grid" id="main-grid"></div></div>

<script>
    const channels = [
        { name: "Vĩnh Long 1", short: "THVL1", logo: "https://vn.xemtv.net/image/thvl1.png", url: "https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8" },
        { name: "VTV1 HD", short: "VTV1", logo: "https://vn.xemtv.net/image/vtv1.png", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8" },
        { name: "VTV2 HD", short: "VTV2", logo: "https://vn.xemtv.net/image/vtv2.png", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8" },
        { name: "VTV3 HD", short: "VTV3", logo: "https://vn.xemtv.net/image/vtv3.png", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8" },
        { name: "VTV5 HD", short: "VTV5", logo: "https://vn.xemtv.net/image/vtv5.png", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8" },
        { name: "VTV7 HD", short: "VTV7", logo: "https://vn.xemtv.net/image/vtv7.png", url: "https://live.fptplay53.net/fnxhd1/vtv7hd_vhls.smil/chunklist_b5000000.m3u8" },
        { name: "HTV7 HD", short: "HTV7", logo: "https://vn.xemtv.net/image/htv7.png", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8" },
        { name: "HTV9 HD", short: "HTV9", logo: "https://vn.xemtv.net/image/htv9.png", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8" }
    ];

    const v = document.getElementById('main-video'), view = document.getElementById('video-viewport');
    const overlay = document.getElementById('ui-overlay'), webStats = document.getElementById('web-stats'), fsStats = document.getElementById('fs-stats');
    let hls = new Hls(), timer, lastDecodedFrames = 0, lastTimestamp = performance.now();

    function showUI() {
        overlay.classList.add('active');
        clearTimeout(timer);
        timer = setTimeout(() => overlay.classList.remove('active'), 2000);
    }

    function handleFS(enter, e) {
        if(e) e.stopPropagation();
        if(enter) {
            if(view.requestFullscreen) view.requestFullscreen();
            else if(view.webkitRequestFullscreen) view.webkitRequestFullscreen();
        } else {
            if(document.exitFullscreen) document.exitFullscreen();
            else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => document.body.classList.toggle('is-fs', !!document.fullscreenElement));
    document.addEventListener('webkitfullscreenchange', () => document.body.classList.toggle('is-fs', !!document.webkitIsFullScreen));

    // Tính toán FPS và Stats
    setInterval(() => {
        if (v.readyState > 0) {
            const now = performance.now();
            const decodedFrames = v.getVideoPlaybackQuality ? v.getVideoPlaybackQuality().totalVideoFrames : 0;
            const fps = Math.round((decodedFrames - lastDecodedFrames) / ((now - lastTimestamp) / 1000));
            lastDecodedFrames = decodedFrames; lastTimestamp = now;

            const quality = hls.levels[hls.currentLevel] || {};
            const bitrate = quality.bitrate ? (quality.bitrate / 1000000).toFixed(1) + "Mbps" : "0Mbps";
            const res = v.videoWidth + "x" + v.videoHeight;
            
            const txt = `${res} | ${bitrate} | ${fps || 0}fps`;
            webStats.innerText = txt;
            fsStats.innerText = txt;
        }
    }, 1000);

    function play(c) {
        document.getElementById('now-playing').innerText = c.name;
        if (Hls.isSupported()) {
            hls.destroy(); hls = new Hls();
            hls.loadSource(c.url); hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else { v.src = c.url; v.play(); }
        overlay.classList.remove('active');
    }

    function init() {
        const side = document.getElementById('side-list'), grid = document.getElementById('main-grid');
        channels.forEach(c => {
            const sItem = document.createElement('div'); sItem.className = 'side-item';
            sItem.innerHTML = `<img src="${c.logo}">`;
            sItem.onclick = () => play(c);
            side.appendChild(sItem);

            const gItem = document.createElement('div'); gItem.className = 'grid-item';
            gItem.innerHTML = `<img src="${c.logo}" style="width:100%">`;
            gItem.onclick = () => play(c);
            grid.appendChild(gItem);
        });
        play(channels.find(c => c.short === "VTV1") || channels[0]);
    }
    init();
</script>
</body>
</html>
