<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TV WEB ENGINE (DRM + AUTOPLAY)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <script src="playlist.js"></script>
    <style>
        :root { --yellow: #ffcc00; --focus-bg: rgba(255,255,255,0.25); --sidebar-w: 163px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        
        #app {
            position: absolute;
            top: 50%; left: 50%;
            background: #000;
            overflow: hidden;
        }
        video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; display: block; }
        
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--yellow); font-weight: bold; font-size: 16px; z-index: 60; text-shadow: 0 0 12px #000; pointer-events: none; display: none; }
        
        /* Gợi ý bật tiếng cho nền Web */
        #unmute-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 204, 0, 0.85); color: #000; padding: 8px 16px; font-weight: bold; border-radius: 20px; font-size: 13px; z-index: 55; pointer-events: none; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        .controls-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 50; }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }
        .sidebar { position: absolute; top: 0; left: 0; width: var(--sidebar-w); height: 100%; background: rgba(10,10,10,0.97); border-right: 1px solid #333; overflow-y: auto; overflow-x: hidden; transform: translateX(-100%); transition: transform 0.2s; scrollbar-width: none; }
        .sidebar::-webkit-scrollbar { display: none; }
        .controls-overlay.active .sidebar { transform: translateX(0); }
        .side-item { padding: 14px 10px; border-bottom: 1px solid #1a1a1a; text-align: center; opacity: 0.5; cursor: pointer; transition: 0.15s; outline: none; }
        .side-item.active { opacity: 1; border-left: 4px solid var(--yellow); background: rgba(255,204,0,0.12); }
        .side-item.focused { opacity: 1; background: var(--focus-bg); transform: scale(1.04); }
        .side-item img { max-width: 90%; max-height: 50px; object-fit: contain; pointer-events: none; display: block; margin: auto; }
        #stats { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.65); color: #00ff00; font-family: monospace; font-size: 11px; padding: 4px 8px; border-radius: 5px; pointer-events: none; line-height: 1.6; white-space: nowrap; z-index: 55; }
        .shaka-controls-container { display: none !important; }
    </style>
</head>
<body>
<div id="app" data-shaka-player-container>
    <video id="main-video" autoplay playsinline webkit-playsinline muted></video>
    <div id="loading">ĐANG TẢI...</div>
    <div id="unmute-hint">CHẠM MÀN HÌNH ĐỂ BẬT TIẾNG 🔊</div>
    <div class="controls-overlay" id="ui-overlay">
        <div class="sidebar" id="sidebar-el"></div>
        <div id="stats">—</div>
    </div>
</div>

<script>
const v           = document.getElementById('main-video');
const overlay     = document.getElementById('ui-overlay');
const sidebar     = document.getElementById('sidebar-el');
const loader      = document.getElementById('loading');
const statsEl     = document.getElementById('stats');
const app         = document.getElementById('app');
const unmuteHint  = document.getElementById('unmute-hint');

let player = null;
let channels = [], curIdx = 0, uiTimer = null, statsInterval = null;
let frameCount = 0, fps = 0, lastTs = 0;

// LINK PHÁT MỒI KÊNH VTV1 CŨ
const DEFAULT_CHANNEL_URL = "https://060524.com/vtv1/index.m3u8";

function autoResponsiveLandscape() {
    const w = window.innerWidth; const h = window.innerHeight;
    if (w < h) {
        app.style.width = h + 'px'; app.style.height = w + 'px';
        app.style.transform = 'translate(-50%, -50%) rotate(90deg)';
    } else {
        app.style.width = '100%'; app.style.height = '100%';
        app.style.transform = 'translate(-50%, -50%) rotate(0deg)';
    }
}
autoResponsiveLandscape();
window.addEventListener('resize', autoResponsiveLandscape);
window.addEventListener('orientationchange', autoResponsiveLandscape);

(function fpsLoop() {
    if (!v.paused) { frameCount++; const now = performance.now();
    if (now - lastTs >= 1000) { fps = frameCount; frameCount = 0; lastTs = now; }
    } requestAnimationFrame(fpsLoop);
})();

function updateStats() {
    if (!player) return;
    const stats = player.getStats();
    const res = v.videoWidth ? `${v.videoWidth}×${v.videoHeight}` : '—';
    const mbps = stats && stats.estimatedBandwidth ? (stats.estimatedBandwidth / 1e6).toFixed(1) + ' Mbps' : 'Auto';
    statsEl.innerText = `${res} | ${mbps} | ${fps} fps`;
}

async function initPlayer() {
    if (shaka.polyfill && shaka.polyfill.installAll) shaka.polyfill.installAll();
    player = new shaka.Player(v);
    
    v.addEventListener('playing', () => {
        loader.style.display = 'none';
        // Nếu video đang phát mà vẫn bị câm, hiện dòng nhắc người dùng bật tiếng
        if (v.muted) unmuteHint.style.display = 'block';
    });
    v.addEventListener('waiting', () => loader.style.display = 'block');
}

async function directPlay(channelObjOrUrl) {
    if (!player) return;
    loader.style.display = 'block';

    try {
        player.configure({ drm: { clearKeys: {} } });

        if (typeof channelObjOrUrl === 'string') {
            await player.load(channelObjOrUrl);
        } else {
            if (channelObjOrUrl.drm_key) {
                player.configure({ drm: { clearKeys: channelObjOrUrl.drm_key } });
            }
            await player.load(channelObjOrUrl.url);
        }
        v.play().catch(() => {});
    } catch (e) { console.error('Play lỗi:', e); }
}

function playChannel(idx) {
    if (idx < 0 || idx >= channels.length) return;
    curIdx = idx;
    loader.innerText = "ĐANG TẢI...";
    document.querySelectorAll('.side-item').forEach(el => el.classList.remove('active'));
    const activeEl = sidebar.children[idx];
    if (activeEl) { activeEl.classList.add('active'); activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
    directPlay(channels[idx]);
}

function showUI() {
    overlay.classList.add('active'); setFocus(curIdx); updateStats();
    if (!statsInterval) statsInterval = setInterval(updateStats, 1000); resetHideTimer();
}
function hideUI() { overlay.classList.remove('active'); clearFocus(); clearTimeout(uiTimer); clearInterval(statsInterval); statsInterval = null; }
function resetHideTimer() { clearTimeout(uiTimer); uiTimer = setTimeout(hideUI, 2000); }
function setFocus(idx) { document.querySelectorAll('.side-item').forEach(el => el.classList.remove('focused')); const el = sidebar.children[idx]; if (el) { el.classList.add('focused'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); } }
function clearFocus() { document.querySelectorAll('.side-item').forEach(el => el.classList.remove('focused')); }

// CHẠM VÀO MÀN HÌNH WEB ĐỂ BẬT TIẾNG TỨC THÌ
app.addEventListener('click', (e) => {
    if (v.muted) {
        v.muted = false;
        unmuteHint.style.display = 'none';
    }
    if (sidebar.contains(e.target)) return;
    overlay.classList.contains('active') ? hideUI() : showUI();
});

function parseAndBuildMenu(textScript) {
    try {
        const jsonString = textScript.substring(textScript.indexOf('{'), textScript.lastIndexOf('}') + 1);
        const data = JSON.parse(jsonString);
        let raw = Object.values(data).flat();

        const thvl1 = raw.find(c => c.short === 'THVL1');
        channels = thvl1 ? [thvl1, ...raw.filter(c => c.short !== 'THVL1')] : raw;

        sidebar.innerHTML = "";
        channels.forEach((c, i) => {
            const el = document.createElement('div');
            el.className = 'side-item';
            el.innerHTML = `<img src="${c.logo}" loading="lazy" title="${c.name}">`;
            el.addEventListener('click', (e) => { e.stopPropagation(); playChannel(i); hideUI(); });
            sidebar.appendChild(el);
        });

        const vtv1Idx = channels.findIndex(c => c.short === 'VTV1' || c.short === 'tv360plus1');
        curIdx = vtv1Idx >= 0 ? vtv1Idx : 0;
        if (sidebar.children[curIdx]) sidebar.children[curIdx].classList.add('active');

    } catch(e) { console.log("Lỗi đồng bộ menu", e); }
}

async function init() {
    autoResponsiveLandscape();
    await initPlayer();

    // Web không cần delay 0.5s lâu như Android, quất luôn sau 100ms
    setTimeout(() => {
        directPlay(DEFAULT_CHANNEL_URL);

        // Kéo dữ liệu từ file playlist.js trên github về đồng bộ
        fetch('https://raw.githubusercontent.com/12ecember93/httv/main/playlist.js')
            .then(res => res.text())
            .then(text => parseAndBuildMenu(text))
            .catch(() => {
                // Dự phòng nếu lỗi mạng github, đọc file local
                if (typeof playlistData !== 'undefined') {
                    parseAndBuildMenu(JSON.stringify(playlistData));
                }
            });
    }, 100);
}

init();
</script>
</body>
</html>
