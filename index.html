<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV PRO MAX</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-dark: #0a0a0a; --card-bg: #161616; --action-blue: #0056b3; --stat-color: #00ff00; --text-gold: #ffcc00; }
        body { font-family: sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Player Box */
        #video-viewport { position: sticky; top: 0; width: 100%; aspect-ratio: 16/9; background: #000; z-index: 100; overflow: hidden; }
        video { width: 100%; height: 100%; display: block; }

        /* Stats & Overlay */
        .stats-overlay { color: var(--stat-color); font-family: monospace; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; pointer-events: none; }
        #sb-stats { font-size: 10px; margin: 10px 10px 5px auto; text-align: right; display: block; width: fit-content; }
        #fs-stats { position: absolute; top: 10px; right: 10px; font-size: 10px; display: none; z-index: 2147483647; }
        body.is-fs .controls-overlay.active #fs-stats { display: block; }

        .controls-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.2s;
            z-index: 2147483640; display: flex; pointer-events: none;
        }
        .controls-overlay.active { opacity: 1; pointer-events: auto; }

        /* Sidebar */
        .sidebar {
            width: 130px; height: 100%; background: rgba(10,10,10,0.98);
            transform: translateX(-100%); transition: transform 0.2s ease;
            border-right: 1px solid #333; overflow-y: auto; display: flex; flex-direction: column;
        }
        .controls-overlay.active .sidebar { transform: translateX(0); }
        .side-item { padding: 12px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: center; min-height: 55px; cursor: pointer; }
        .side-item img { max-width: 100%; max-height: 40px; object-fit: contain; }

        /* Floating Buttons */
        .btn-group { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 2147483647; }
        .action-btn { background: var(--action-blue); color: white; border: 1.5px solid #fff; padding: 12px 18px; border-radius: 50px; font-weight: bold; font-size: 13px; }
        body.is-fs .reload-btn, body.is-fs #btn-enter { display: none; }
        #btn-exit { display: none; position: absolute; bottom: 20px; right: 20px; }
        body.is-fs #btn-exit { display: block; }

        /* Main Content */
        .main-content { padding: 15px; }
        .info-row { margin-bottom: 20px; }
        .info-row h2 { margin: 0; font-size: 18px; color: var(--text-gold); }
        #web-stats { font-size: 11px; margin-top: 5px; display: inline-block; }

        /* Categories & Grid 4 */
        .cat-title { color: #55acee; font-size: 13px; font-weight: bold; text-transform: uppercase; margin: 20px 0 10px; border-left: 3px solid #55acee; padding-left: 8px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .grid-item { 
            background: var(--card-bg); border-radius: 6px; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            aspect-ratio: 1.2/1; cursor: pointer; padding: 5px;
        }
        .grid-item img { max-width: 90%; max-height: 80%; object-fit: contain; }

        @media (min-width: 992px) { 
            #video-viewport { max-width: 850px; margin: 15px auto; border-radius: 8px; position: relative; }
            .main-content { max-width: 850px; margin: 0 auto; }
        }
    </style>
</head>
<body>

<div id="video-viewport" onclick="showUI()">
    <video id="main-video" autoplay playsinline></video>
    <div id="fs-stats" class="stats-overlay">0 Mbps | 0 fps</div>
    <div class="controls-overlay" id="ui-overlay">
        <div class="sidebar" id="side-list" onclick="event.stopPropagation()">
            <div id="sb-stats" class="stats-overlay">...</div>
        </div>
        <button id="btn-exit" class="action-btn" onclick="handleFS(false, event)">THOÁT</button>
    </div>
</div>

<div class="btn-group">
    <button class="action-btn" style="background:#333" onclick="location.reload()">↻</button>
    <button id="btn-enter" class="action-btn" onclick="handleFS(true, event)">TOÀN MÀN HÌNH</button>
</div>

<div class="main-content">
    <div class="info-row">
        <h2 id="now-playing">VTV1 HD</h2>
        <div id="web-stats" class="stats-overlay">0x0 | 0 Mbps | 0 fps</div>
    </div>
    <div id="category-container"></div>
</div>

<script>
    const channels = [
        { cat: "VTV", name: "Vĩnh Long 1", short: "THVL1", logo: "https://vn.xemtv.net/image/thvl1.png", url: "https://live.fptplay53.net/epzhd2/vinhlong1_vhls.smil/chunklist_b5000000.m3u8" },
        { cat: "VTV", name: "VTV1 HD", short: "VTV1", logo: "https://vn.xemtv.net/image/vtv1.png", url: "https://live.fptplay53.net/fnxch2/vtv1hd_abr.smil/chunklist.m3u8" },
        { cat: "VTV", name: "VTV2 HD", short: "VTV2", logo: "https://vn.xemtv.net/image/vtv2.png", url: "https://live.fptplay53.net/fnxch2/vtv2hd_abr.smil/chunklist.m3u8" },
        { cat: "VTV", name: "VTV3 HD", short: "VTV3", logo: "https://vn.xemtv.net/image/vtv3.png", url: "https://live.fptplay53.net/fnxch2/vtv3hd_abr.smil/chunklist.m3u8" },
        { cat: "VTV", name: "VTV4 HD", short: "VTV4", logo: "https://vn.xemtv.net/image/vtv4.png", url: "https://live.fptplay53.net/fnxch2/vtv4hd_abr.smil/chunklist.m3u8" },
        { cat: "VTV", name: "VTV5 HD", short: "VTV5", logo: "https://vn.xemtv.net/image/vtv5.png", url: "https://live-a.fptplay53.net/live/media/VTV5HD/live_hls_avc/index.m3u8" },
        { cat: "VTV", name: "VTV7 HD", short: "VTV7", logo: "https://vn.xemtv.net/image/vtv7.png", url: "https://live.fptplay53.net/fnxhd1/vtv7hd_vhls.smil/chunklist_b5000000.m3u8" },
        { cat: "VTV", name: "VTV8 HD", short: "VTV8", logo: "https://vn.xemtv.net/image/vtv8.png", url: "https://live.fptplay53.net/epzhd1/vtv8hd_vhls.smil/chunklist.m3u8" },
        { cat: "VTV", name: "VTV9 HD", short: "VTV9", logo: "https://vn.xemtv.net/image/vtv9.png", url: "https://toiyeuvietnam.dpdns.org/TuyetDoiKhongKinhDoanh/vtv9-hd/KenhCoBan.m3u8" },
        { cat: "HTV", name: "HTV7 HD", short: "HTV7", logo: "https://vn.xemtv.net/image/htv7.png", url: "https://live.fptplay53.net/epzch2/htv7hd_abr.smil/chunklist.m3u8" },
        { cat: "HTV", name: "HTV9 HD", short: "HTV9", logo: "https://vn.xemtv.net/image/htv9.png", url: "https://live.fptplay53.net/epzhd1/htv9hd_vhls.smil/chunklist.m3u8" },
        { cat: "HTV", name: "HTV1 HD", short: "HTV1", logo: "https://vn.xemtv.net/image/htv1.png", url: "https://live.fptplay53.net/epzhd1/htv1_hls.smil/chunklist.m3u8" },
        { cat: "HTV", name: "HTV2 HD", short: "HTV2", logo: "https://vn.xemtv.net/image/htv2.png", url: "https://live.fptplay53.net/epzhd1/htv2hd_vhls.smil/chunklist.m3u8" },
        { cat: "HTV", name: "HTV3 HD", short: "HTV3", logo: "https://vn.xemtv.net/image/htv3.png", url: "https://live.fptplay53.net/epzhd1/htv3_hls.smil/chunklist.m3u8" },
        { cat: "KHÁC", name: "Vietnam Today", short: "VNT", logo: "https://vn.xemtv.net/image/vietnamtoday.png", url: "https://live.fptplay53.net/fnxhd1/vntoday_vhls.smil/chunklist_b5000000.m3u8" }
    ];

    const v = document.getElementById('main-video'), view = document.getElementById('video-viewport');
    const overlay = document.getElementById('ui-overlay'), wStats = document.getElementById('web-stats'), fStats = document.getElementById('fs-stats'), sStats = document.getElementById('sb-stats');
    let hls = new Hls(), timer, lastTime = 0, frameCount = 0, fps = 0;

    function showUI() {
        overlay.classList.add('active');
        clearTimeout(timer);
        timer = setTimeout(() => overlay.classList.remove('active'), 2000);
    }

    function handleFS(enter, e) {
        if(e) e.stopPropagation();
        if(enter) {
            if(view.requestFullscreen) view.requestFullscreen();
            else if(view.webkitRequestFullscreen) view.webkitRequestFullscreen();
            if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
        } else {
            if(document.exitFullscreen) document.exitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => document.body.classList.toggle('is-fs', !!document.fullscreenElement));

    function updateFPS() {
        if (!v.paused) {
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) { fps = frameCount; frameCount = 0; lastTime = now; }
        }
        requestAnimationFrame(updateFPS);
    }
    updateFPS();

    setInterval(() => {
        if (v.readyState > 0) {
            const level = hls.levels[hls.currentLevel] || {};
            const mbps = level.bitrate ? (level.bitrate / 1000000).toFixed(1) + " Mbps" : "Auto";
            const combined = `${mbps} | ${fps} fps`;
            wStats.innerText = `${v.videoWidth}x${v.videoHeight} | ${combined}`;
            fStats.innerText = combined; sStats.innerText = combined;
        }
    }, 1500);

    function play(c) {
        document.getElementById('now-playing').innerText = c.name;
        hls.destroy(); hls = new Hls();
        hls.loadSource(c.url); hls.attachMedia(v);
        hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        overlay.classList.remove('active');
        window.scrollTo({ top: 0, behavior: 'smooth' }); // Cuộn lên đầu khi chọn kênh
    }

    function init() {
        const side = document.getElementById('side-list'), container = document.getElementById('category-container');
        const groups = {};

        channels.forEach(c => {
            // Sidebar
            const sItem = document.createElement('div'); sItem.className = 'side-item';
            sItem.innerHTML = `<img src="${c.logo}">`;
            sItem.onclick = () => play(c); side.appendChild(sItem);

            // Grouping for Grid
            if (!groups[c.cat]) groups[c.cat] = [];
            groups[c.cat].push(c);
        });

        for (const [catName, chanList] of Object.entries(groups)) {
            const section = document.createElement('div');
            section.innerHTML = `<div class="cat-title">${catName}</div>`;
            const grid = document.createElement('div');
            grid.className = 'grid';
            chanList.forEach(c => {
                const gItem = document.createElement('div'); gItem.className = 'grid-item';
                gItem.innerHTML = `<img src="${c.logo}">`;
                gItem.onclick = () => play(c);
                grid.appendChild(gItem);
            });
            section.appendChild(grid);
            container.appendChild(section);
        }
        play(channels.find(c => c.short === "VTV1") || channels[0]);
    }
    init();
</script>
</body>
</html>
